name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release, e.g. v0.1.0'
        required: true
        type: string
      publish_npm:
        description: 'Publish package to npm (public)'
        required: true
        default: false
        type: boolean
      create_github_release:
        description: 'Create a GitHub Release for the tag'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm pack --dry-run

      - name: Publish to npm
        if: inputs.publish_npm == true
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: inputs.create_github_release == true
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: true
